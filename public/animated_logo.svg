<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .draw {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw-in 2s ease-in-out forwards;
    }
    .delay-1 { animation-delay: 0.3s; }
    .delay-2 { animation-delay: 0.6s; }
    .delay-3 { animation-delay: 0.9s; }
    
    @keyframes draw-in {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#0A0A0B" />
  
  <g stroke="#E6C875" stroke-width="3" fill="#0A0A0B" stroke-linejoin="round">
    <!-- Right Ribbon (Behind) -->
    <polygon class="draw" points="58,2 89,2 70,50 45,45" />
    
    <!-- Left Ribbon (In Front) -->
    <polygon class="draw delay-1" points="11,2 42,2 55,45 30,50" />
    
    <!-- Medal Circle (On Top of Ribbons) -->
    <circle class="draw delay-2" cx="50" cy="65" r="26" />
  </g>
  
  <!-- Inner Lines of Medal -->
  <g stroke="#E6C875" stroke-width="3" stroke-linecap="round">
    <!-- Top inner line (shorter) -->
    <line class="draw delay-3" x1="42" y1="58" x2="58" y2="58" />
    <!-- Bottom inner line (longer) -->
    <line class="draw delay-3" x1="34" y1="68" x2="66" y2="68" />
  </g>
</svg>
